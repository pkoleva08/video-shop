spring.application.name=video-shop-backend
server.port=8080

# Local file-based H2 database (data persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/videoshop-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

videoshop.consultant.username=consultant
videoshop.consultant.password=demo123
videoshop.consultant.name=Demo Consultant
